<div class="top-bar">
  <div>
    <div class="top-bar-title">Tableau de bord</div>
    <div class="top-bar-sub">Vue globale de votre système de gestion</div>
  </div>
</div>

<div class="page-content">

  <div class="stat-grid">

    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:#ede9fe;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="stat-label">Produits totaux</div>
      <div class="stat-value">{{ totalProduits }}</div>
      <a routerLink="/produits" class="stat-link" style="color:#7c3aed;">
        Voir les produits
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>

    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:#d1fae5;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </div>
      <div class="stat-label">Entrepôts actifs</div>
      <div class="stat-value">{{ totalEntrepots }}</div>
      <a routerLink="/entrepots" class="stat-link" style="color:#059669;">
        Voir les entrepôts
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>

    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:#fef3c7;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="stat-label">Stocks bas</div>
      <div class="stat-value">{{ totalStocksBas }}</div>
      <a routerLink="/stocks" class="stat-link" style="color:#d97706;">
        Voir les stocks
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>

    <div class="stat-card">
      <div class="stat-icon-wrap" style="background:#fee2e2;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div class="stat-label">Alertes actives</div>
      <div class="stat-value">{{ totalAlertes }}</div>
      <a routerLink="/alertes" class="stat-link" style="color:#dc2626;">
        Voir les alertes
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>

  </div>

</div>
