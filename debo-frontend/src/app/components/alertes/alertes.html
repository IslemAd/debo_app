<div class="top-bar">
  <div>
    <div class="top-bar-title">Alertes de stock</div>
    <div class="top-bar-sub">Produits en dessous du seuil d'alerte</div>
  </div>
</div>

<div class="page-content">

  <div *ngIf="message" class="alert alert-success">
    <span>{{ message }}</span>
    <button class="alert-close" (click)="message=''">×</button>
  </div>

  <div *ngIf="erreur" class="alert alert-danger">
    <span>{{ erreur }}</span>
    <button class="alert-close" (click)="erreur=''">×</button>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title" style="display:flex; align-items:center; gap:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        Alertes non résolues
      </div>
      <span class="badge" [class.badge-red]="alertes.length > 0" [class.badge-green]="alertes.length === 0">
        {{ alertes.length }} alerte(s)
      </span>
    </div>

    <table class="data-table">
      <thead>
      <tr>
        <th>Réf.</th>
        <th>Message</th>
        <th>Date</th>
        <th>Statut</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let a of alertes; trackBy: trackByAlerte">
        <td><span class="badge badge-red">#{{ a.id }}</span></td>
        <td style="font-weight:500; color:#111827;">{{ a.message }}</td>
        <td style="color:#6b7280; font-size:13px;">{{ a.dateCreation }}</td>
        <td>
          <span class="badge badge-red">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:4px;">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            </svg>
            Non résolue
          </span>
        </td>
        <td>
          <button class="btn btn-success" (click)="resoudre(a.id!)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Résoudre
          </button>
        </td>
      </tr>
      <tr *ngIf="alertes.length === 0">
        <td colspan="5">
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <div class="empty-state-text">Aucune alerte active — tout est en ordre</div>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

</div>
